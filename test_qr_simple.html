<!DOCTYPE html>
<html>
<head>
    <title>QR Test</title>
    <script src="https://unpkg.com/qr-scanner@1.4.2/qr-scanner.umd.min.js"></script>
</head>
<body>
    <video id="video" width="300" height="300" autoplay></video>
    <button onclick="startScan()">Start Camera</button>
    <button onclick="scanNow()">Scan QR</button>
    <div id="result"></div>
    
    <script>
        let stream = null;
        
        async function startScan() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                document.getElementById('video').srcObject = stream;
                console.log('Camera started');
            } catch (error) {
                console.error('Camera error:', error);
            }
        }
        
        async function scanNow() {
            const video = document.getElementById('video');
            try {
                const result = await QrScanner.scanImage(video, { returnDetailedScanResult: true });
                document.getElementById('result').innerText = 'Found: ' + result.data;
                console.log('QR detected:', result.data);
            } catch (error) {
                console.error('Scan error:', error);
                document.getElementById('result').innerText = 'No QR found';
            }
        }
    </script>
</body>
</html>
